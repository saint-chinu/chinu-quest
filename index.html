<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>チヌクエスト</title>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#21262d;
  --border:#30363d;--border2:#58a6ff;
  --text:#c9d1d9;--text-dim:#8b949e;--text-gold:#ffd700;
  --fire:#ff6b35;--water:#58a6ff;--grass:#3fb950;
  --hg:#22cc44;--hy:#ddcc00;--hr:#cc2200;
  --cp:#f7c948;--p1:#58a6ff;--p2:#ff6b35;
}
html,body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;min-height:100vh;overflow-x:hidden;max-width:480px;margin:0 auto}

/* ===== 画面切替 ===== */
.screen{display:none}.screen.active{display:block}

/* ===== 共通ボタン ===== */
.btn{width:100%;padding:14px;border:2px solid var(--border2);border-radius:8px;background:var(--bg3);color:var(--text-gold);cursor:pointer;font-family:'DotGothic16',monospace;font-size:14px;letter-spacing:1px;transition:all .15s;text-align:center;-webkit-user-select:none;user-select:none;display:block;margin-bottom:8px}
.btn:active{transform:scale(.97)}.btn:disabled{opacity:.3;pointer-events:none}
.btn.green{border-color:var(--grass);color:var(--grass);background:#001a08}
.btn.red{border-color:var(--fire);color:var(--fire);background:#1a0800}
.btn.blue{border-color:var(--water);color:var(--water);background:#00081a}
.btn.gold{border-color:var(--text-gold);color:var(--text-gold);background:#1a1400}
.btn.purple{border-color:#9f7ae8;color:#c9a8ff;background:#100a1a}
.btn.gray{border-color:var(--border);color:var(--text-dim);background:var(--bg2)}

/* ===== パネル ===== */
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px}
.panel-title{font-size:10px;color:var(--text-dim);letter-spacing:2px;margin-bottom:10px;border-bottom:1px solid var(--border);padding-bottom:6px;text-transform:uppercase;font-family:'DotGothic16',monospace}

/* ===== テキスト入力 ===== */
.input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:10px 12px;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:14px;outline:none;transition:border-color .2s}
.input:focus{border-color:var(--border2)}
.input::placeholder{color:var(--text-dim)}
.input-label{font-size:11px;color:var(--text-dim);margin-bottom:5px;display:block}

/* ===== タイトル画面 ===== */
#titleScreen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:radial-gradient(ellipse at 50% 0%,#1a2030 0%,var(--bg) 70%)}
.title-logo{font-family:'DotGothic16',monospace;font-size:32px;color:var(--text-gold);letter-spacing:6px;text-align:center;margin-bottom:6px;text-shadow:0 0 30px rgba(255,215,0,.3)}
.title-sub{font-size:11px;color:var(--text-dim);letter-spacing:3px;margin-bottom:32px;text-align:center}
.title-form{width:100%;max-width:360px;display:flex;flex-direction:column;gap:12px}

/* ===== キャラ選択 ===== */
.char-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.char-btn{border:2px solid var(--border);border-radius:8px;padding:10px 4px;text-align:center;cursor:pointer;transition:all .18s;background:var(--bg3);-webkit-user-select:none}
.char-btn:active{transform:scale(.95)}
.char-btn.selected-fire{border-color:var(--fire);background:#1a0800}
.char-btn.selected-water{border-color:var(--water);background:#00081a}
.char-btn.selected-grass{border-color:var(--grass);background:#001a08}
.char-icon{font-size:28px;display:block;margin-bottom:3px;line-height:1.2}
.char-name{font-size:10px;color:var(--text-dim)}
.char-desc{font-size:9px;color:var(--text-dim);margin-top:2px;line-height:1.3}

/* ===== ルームコード ===== */
.room-code{font-family:'DotGothic16',monospace;font-size:36px;color:var(--text-gold);letter-spacing:8px;text-align:center;padding:16px;background:var(--bg3);border-radius:8px;border:2px solid var(--text-gold)}
.room-code-copy{font-size:11px;color:var(--text-dim);text-align:center;margin-top:4px}

/* ===== 待機画面 ===== */
.player-list{display:flex;flex-direction:column;gap:8px}
.player-entry{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg3);border-radius:8px;border:1px solid var(--border)}
.player-entry.ready{border-color:var(--grass)}
.player-entry-icon{font-size:24px}
.player-entry-info{flex:1}
.player-entry-name{font-size:13px;font-weight:700}
.player-entry-char{font-size:11px;color:var(--text-dim)}
.player-entry-status{font-size:10px;font-family:'DotGothic16',monospace}
.empty-slot{padding:10px 12px;background:var(--bg2);border-radius:8px;border:1px dashed var(--border);text-align:center;font-size:11px;color:var(--text-dim)}

/* ===== 管理者設定 ===== */
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)}
.setting-label{font-size:12px;color:var(--text-dim)}
.setting-value{font-family:'DotGothic16',monospace;font-size:13px;color:var(--text-gold)}
.setting-btns{display:flex;gap:4px}
.mini-btn{padding:4px 10px;border:1px solid var(--border);border-radius:4px;background:var(--bg3);color:var(--text);cursor:pointer;font-size:11px;font-family:'DotGothic16',monospace}
.mini-btn:active{background:var(--border)}
.mini-btn.active{border-color:var(--text-gold);color:var(--text-gold)}

/* ===== ゲーム画面 ===== */
/* ステータスバー */
.status-bar{background:var(--bg2);border-bottom:2px solid var(--border);padding:4px 6px;position:sticky;top:0;z-index:50;overflow-x:auto}
.sbar-inner{display:flex;gap:4px;min-width:max-content}
.pcard{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:5px 7px;min-width:100px;transition:border-color .2s;cursor:pointer}
.pcard.my-turn{border-color:var(--text-gold);box-shadow:0 0 8px rgba(255,215,0,.2)}
.pcard.me{border-color:var(--water)}
.pcard-top{display:flex;align-items:center;gap:4px;margin-bottom:2px}
.pcard-icon{font-size:16px;line-height:1}
.pcard-name{font-size:10px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:52px}
.pcard-rank{font-family:'DotGothic16',monospace;font-size:10px;color:var(--text-gold);margin-left:auto}
.pcard-row{font-size:9px;color:var(--text-dim);line-height:1.7;font-family:'DotGothic16',monospace}
.pcard-row span{color:var(--text)}
.turn-info{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4px 8px;font-family:'DotGothic16',monospace;font-size:9px;color:var(--text-dim);flex-shrink:0}
.turn-info b{font-size:13px;color:var(--text-gold);display:block}

/* ボード */
.board-area{background:#080c10;position:relative}
#boardCanvas{display:block;width:100%}

/* メッセージ */
.msg-box{background:var(--bg2);border-top:2px solid var(--border2);border-bottom:1px solid var(--border);padding:10px 12px;font-family:'DotGothic16',monospace;font-size:13px;line-height:1.9;min-height:56px}
.msg-cursor{animation:blink .6s step-end infinite;display:inline-block}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* ダイス */
.dice-row{display:flex;align-items:center;justify-content:center;gap:16px;padding:8px;background:var(--bg2)}
.dice-face{font-size:42px;font-family:'DotGothic16',monospace;color:var(--text-gold);line-height:1}
.sub-dice{font-size:28px;color:var(--cp)}

/* コマンドエリア */
.cmd-area{display:flex;flex-wrap:wrap;gap:8px;padding:10px;background:var(--bg)}
.cmd-area .btn{flex:1;min-width:120px;margin-bottom:0}

/* ログ */
.log-section{background:var(--bg2);border-top:1px solid var(--border)}
.log-toggle{width:100%;padding:8px 12px;background:none;border:none;color:var(--text-dim);font-size:11px;cursor:pointer;display:flex;justify-content:space-between;font-family:'Noto Sans JP',sans-serif}
.log-body{display:none;padding:6px 12px;max-height:100px;overflow-y:auto;font-size:10px;color:var(--text-dim);line-height:1.9}
.log-body.open{display:block}

/* ===== 戦闘画面 ===== */
#battleScreen{background:var(--bg);min-height:100vh}
.battle-header{background:var(--bg2);border-bottom:2px solid var(--fire);padding:10px 14px;font-family:'DotGothic16',monospace;font-size:13px;color:var(--fire);letter-spacing:2px}
.battle-hud{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;padding:10px 12px;background:var(--bg2);border-bottom:1px solid var(--border)}
.bhud-box{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:8px}
.bhud-box.player-side{border-color:var(--water)}
.bhud-box.monster-side{border-color:var(--fire)}
.bhud-name{font-size:11px;font-weight:700;margin-bottom:4px}
.bhud-hp-wrap{height:8px;background:#111;border-radius:4px;overflow:hidden;margin-bottom:4px}
.bhud-hp{height:100%;border-radius:4px;transition:width .5s,background .5s}
.bhud-stats{font-size:10px;color:var(--text-dim);line-height:1.7}
.bhud-stats span{color:var(--text)}
.bhud-vs{font-family:'DotGothic16',monospace;font-size:16px;color:var(--text-dim);display:flex;align-items:center}

/* フィールド */
.battle-field{height:180px;background:linear-gradient(180deg,#050a14 0%,#0a1428 55%,#141e10 55%,#1a2814 100%);position:relative;overflow:hidden;border-bottom:1px solid var(--border)}
.sprite-player{position:absolute;left:15%;bottom:35%;font-size:60px;line-height:1;filter:drop-shadow(0 4px 12px rgba(88,166,255,.5));transition:transform .15s}
.sprite-monster{position:absolute;right:15%;bottom:35%;font-size:68px;line-height:1;filter:drop-shadow(0 4px 12px rgba(255,107,53,.5))}
@keyframes atk-p{0%{transform:translateX(0)}40%{transform:translateX(40px)}100%{transform:translateX(0)}}
@keyframes atk-m{0%{transform:translateX(0)}40%{transform:translateX(-40px)}100%{transform:translateX(0)}}
@keyframes hit{0%,100%{opacity:1}25%{opacity:.3;filter:drop-shadow(0 0 12px #ff0000)}75%{opacity:.6}}
.dmg-pop{position:absolute;font-family:'DotGothic16',monospace;font-weight:bold;pointer-events:none;animation:pop .9s forwards;text-shadow:2px 2px 4px #000}
@keyframes pop{0%{opacity:1;transform:translateY(0) scale(1.2)}100%{opacity:0;transform:translateY(-50px) scale(.8)}}

/* 戦闘メッセージ・コマンド */
.battle-msg{background:var(--bg2);border:2px solid var(--border2);padding:12px 14px;font-family:'DotGothic16',monospace;font-size:12px;line-height:2;min-height:62px}
.battle-cmd{display:flex;flex-wrap:wrap;gap:8px;padding:10px;background:var(--bg)}
.battle-cmd .btn{flex:1;min-width:120px;margin-bottom:0}

/* 戦闘結果 */
.battle-result{text-align:center;padding:20px 12px}
.result-banner{font-family:'DotGothic16',monospace;font-size:24px;letter-spacing:4px;margin-bottom:12px;animation:glow 1s ease-in-out infinite alternate}
@keyframes glow{from{text-shadow:0 0 10px currentColor}to{text-shadow:0 0 30px currentColor,0 0 60px currentColor}}
.result-win{color:var(--grass)}.result-lose{color:var(--fire)}.result-draw{color:var(--cp)}
.result-detail{font-size:12px;color:var(--text-dim);line-height:2.2;margin-bottom:16px}

/* ===== 売却画面 ===== */
#sellScreen{min-height:100vh;background:var(--bg)}
.sell-header{background:var(--bg2);border-bottom:2px solid var(--fire);padding:10px 14px}
.sell-title{font-family:'DotGothic16',monospace;font-size:13px;color:var(--fire);letter-spacing:2px}
.sell-desc{font-size:11px;color:var(--text-dim);margin-top:4px}
.sell-list{padding:10px;display:flex;flex-direction:column;gap:8px;overflow-y:auto;max-height:55vh}
.sell-item{background:var(--bg3);border:2px solid var(--border);border-radius:8px;padding:12px;cursor:pointer;transition:all .15s}
.sell-item.selected{border-color:var(--fire);background:#1a0800}
.sell-footer{padding:10px;background:var(--bg);border-top:1px solid var(--border);position:sticky;bottom:0}
.sell-status{font-size:11px;color:var(--text-dim);margin-bottom:8px;font-family:'DotGothic16',monospace}

/* ===== 装備選択オーバーレイ ===== */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);display:none;align-items:flex-end;justify-content:center;z-index:200}
.overlay.show{display:flex}
.overlay-sheet{background:var(--bg2);border-radius:16px 16px 0 0;border-top:3px solid var(--border2);padding:16px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto}
.ov-title{font-family:'DotGothic16',monospace;font-size:14px;color:var(--text-gold);margin-bottom:10px;letter-spacing:2px}
.ov-desc{font-size:11px;color:var(--text-dim);margin-bottom:12px;line-height:1.7}
.ov-list{display:flex;flex-direction:column;gap:6px}
.ov-btn{padding:12px;border:2px solid var(--border);border-radius:8px;background:var(--bg3);color:var(--text);font-family:'DotGothic16',monospace;font-size:12px;cursor:pointer;text-align:left;width:100%;line-height:1.6}
.ov-btn:active{opacity:.8}.ov-btn:disabled{opacity:.3;pointer-events:none}
.ov-btn.green{border-color:var(--grass);color:var(--grass)}
.ov-btn.red{border-color:var(--fire);color:var(--fire)}
.ov-btn.gold{border-color:var(--text-gold);color:var(--text-gold)}
.ov-btn.blue{border-color:var(--water);color:var(--water)}
.ov-btn.purple{border-color:#9f7ae8;color:#c9a8ff}

/* マスポップアップ */
.cell-popup{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:150;padding:16px}
.cell-popup.show{display:flex}
.cell-popup-box{background:var(--bg2);border:2px solid var(--border2);border-radius:12px;padding:16px;width:100%;max-width:340px;font-size:12px}
.cell-popup-title{font-family:'DotGothic16',monospace;font-size:14px;color:var(--text-gold);margin-bottom:10px}
.cell-popup-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border);color:var(--text-dim)}
.cell-popup-row span{color:var(--text)}

/* ===== 結果画面 ===== */
#resultScreen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;background:radial-gradient(ellipse at 50% 0%,#1a2030 0%,var(--bg) 70%)}
.final-title{font-family:'DotGothic16',monospace;font-size:22px;color:var(--text-gold);letter-spacing:4px;text-align:center;margin-bottom:20px}
.final-rank-list{width:100%;max-width:380px;display:flex;flex-direction:column;gap:8px;margin-bottom:24px}
.final-rank-item{display:flex;align-items:center;gap:12px;padding:12px;border-radius:8px;border:1px solid var(--border);background:var(--bg2)}
.final-rank-item.rank1{border-color:var(--text-gold);background:#1a1400}
.final-rank-num{font-family:'DotGothic16',monospace;font-size:20px;width:32px;text-align:center}
.final-rank-icon{font-size:28px}
.final-rank-info{flex:1}
.final-rank-name{font-size:13px;font-weight:700;margin-bottom:2px}
.final-rank-assets{font-size:11px;color:var(--text-gold);font-family:'DotGothic16',monospace}
</style>
</head>
<body>

<!-- ===== タイトル画面 ===== -->
<div class="screen active" id="titleScreen">
  <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;gap:0;background:radial-gradient(ellipse at 50% 0%,#1a2030 0%,var(--bg) 70%)">
    <div class="title-logo">チヌクエスト</div>
    <div class="title-sub">— CHINU QUEST —</div>

    <div class="title-form">
      <!-- 名前入力 -->
      <div class="panel">
        <div class="panel-title">プレイヤー情報</div>
        <label class="input-label">プレイヤー名（最大8文字）</label>
        <input class="input" id="nameInput" maxlength="8" placeholder="名前を入力">

        <div style="margin-top:10px">
          <label class="input-label">ルームコード（参加する場合）</label>
          <input class="input" id="roomCodeInput" maxlength="4" placeholder="4桁のコード（新規作成は空白）" inputmode="numeric" pattern="[0-9]*">
        </div>
      </div>

      <!-- キャラ選択 -->
      <div class="panel">
        <div class="panel-title">キャラクター選択</div>
        <div class="char-grid" id="charGrid"></div>
        <div id="charDetail" style="margin-top:10px;font-size:11px;color:var(--text-dim);line-height:1.7;min-height:36px"></div>
      </div>

      <button class="btn green" id="enterBtn" onclick="handleEnter()">▶ ゲームに参加する</button>
      <div id="enterError" style="font-size:11px;color:var(--fire);text-align:center;min-height:16px"></div>
    </div>
  </div>
</div>

<!-- ===== 管理者画面 ===== -->
<div class="screen" id="adminScreen">
  <div style="padding:16px;max-width:480px">
    <div style="font-family:'DotGothic16',monospace;font-size:16px;color:var(--text-gold);text-align:center;letter-spacing:3px;margin:16px 0">👑 管理者設定</div>

    <!-- ルームコード表示 -->
    <div class="panel">
      <div class="panel-title">ルームコード</div>
      <div class="room-code" id="displayRoomCode">----</div>
      <div class="room-code-copy">参加者にこのコードを伝えてください</div>
    </div>

    <!-- ゲーム設定 -->
    <div class="panel">
      <div class="panel-title">ゲーム設定</div>

      <div class="setting-row">
        <span class="setting-label">参加人数</span>
        <div class="setting-btns">
          <button class="mini-btn" onclick="setPlayers(2)" id="p2btn">2人</button>
          <button class="mini-btn" onclick="setPlayers(3)" id="p3btn">3人</button>
          <button class="mini-btn active" onclick="setPlayers(4)" id="p4btn">4人</button>
        </div>
      </div>

      <div class="setting-row">
        <span class="setting-label">目標総資産</span>
        <div class="setting-btns">
          <button class="mini-btn" onclick="setGoal(5000)" id="g5btn">5000</button>
          <button class="mini-btn active" onclick="setGoal(10000)" id="g10btn">10000</button>
          <button class="mini-btn" onclick="setGoal(20000)" id="g20btn">20000</button>
        </div>
      </div>

      <div class="setting-row">
        <span class="setting-label">マップ</span>
        <span class="setting-value">スタンダード（18マス）</span>
      </div>
    </div>

    <!-- 参加者一覧 -->
    <div class="panel">
      <div class="panel-title">参加者 <span id="playerCount" style="color:var(--text-gold)">1</span>/<span id="maxPlayers">4</span></div>
      <div class="player-list" id="adminPlayerList"></div>
    </div>

    <button class="btn green" id="addAiBtn" onclick="addAI()">🤖 AIプレイヤーを追加</button>
    <button class="btn gold" id="startGameBtn" onclick="adminStartGame()" disabled>▶ ゲームスタート</button>
    <div id="adminError" style="font-size:11px;color:var(--fire);text-align:center;margin-top:4px;min-height:16px"></div>
  </div>
</div>

<!-- ===== 待機画面 ===== -->
<div class="screen" id="waitScreen">
  <div style="padding:16px">
    <div style="font-family:'DotGothic16',monospace;font-size:14px;color:var(--text-dim);text-align:center;letter-spacing:2px;margin:20px 0">⏳ ゲーム開始を待っています…</div>

    <div class="panel">
      <div class="panel-title">ルームコード</div>
      <div class="room-code" id="waitRoomCode" style="font-size:28px">----</div>
    </div>

    <div class="panel">
      <div class="panel-title">参加者</div>
      <div class="player-list" id="waitPlayerList"></div>
    </div>

    <div style="font-size:11px;color:var(--text-dim);text-align:center;margin-top:8px">管理者がゲームを開始するまでお待ちください</div>
  </div>
</div>

<!-- ===== ゲーム画面 ===== -->
<div class="screen" id="gameScreen">
  <!-- ステータスバー -->
  <div class="status-bar" id="statusBar"></div>

  <!-- ボード -->
  <div class="board-area">
    <canvas id="boardCanvas"></canvas>
  </div>

  <!-- メッセージ -->
  <div class="msg-box" id="msgBox">チヌクエスト スタート！<span class="msg-cursor">█</span></div>

  <!-- ダイス -->
  <div class="dice-row">
    <div class="dice-face" id="diceDisp">🎲</div>
    <div class="sub-dice" id="subDiceDisp" style="display:none"></div>
  </div>

  <!-- コマンド -->
  <div class="cmd-area" id="cmdArea">
    <button class="btn gray" disabled>接続中…</button>
  </div>

  <!-- ログ -->
  <div class="log-section">
    <button class="log-toggle" onclick="toggleLog()">
      <span>📜 ゲームログ</span>
      <span id="logArrow">▼</span>
    </button>
    <div class="log-body" id="logBody"></div>
  </div>
</div>

<!-- ===== 戦闘画面 ===== -->
<div class="screen" id="battleScreen">

  <div class="battle-hud">

      <div class="bhud-name" style="color:var(--water)" id="b-pname">プレイヤー</div>
